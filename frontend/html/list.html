<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Unordered list -->
    <h5>프로그래밍 언어</h5> 
    <ul style="list-style: square;">
        <li>Python</li>
        <li>Java</li>
        <li>SQL</li>
     </ul>
    <!-- Ordered List -->
    <hr>
    <!-- ABC, 123, abc... 등등 -->
    <ol type="A"> 
        <li>Apple</li>
        <li>Banana</li>
        <li>Cherry</li>
    </ol>
    
</body>
</html>
